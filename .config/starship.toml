# Starship prompt configuration
# https://starship.rs/config/
#
# Designed to work with and without Nerd Fonts.
# With a Nerd Font terminal (macOS): full glyph set renders.
# Without (headless SSH): falls back to clean ASCII.

command_timeout = 500
add_newline = true

format = """
$username$hostname$directory$git_branch$git_status$python$terraform$kubernetes$cmd_duration
$character"""

[username]
show_always = true
style_user  = "bold cyan"
style_root  = "bold red"
format      = "[$user]($style)"

[hostname]
ssh_only = false
format   = "[@$hostname]($style) "
style    = "bold green"
trim_at  = "."

[directory]
style             = "bold blue"
truncation_length = 4
truncate_to_repo  = false
format            = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "git:"
format = "[$symbol$branch]($style) "
style  = "bold purple"

[git_status]
format  = '([$all_status$ahead_behind]($style) )'
style   = "bold yellow"
ahead   = "⇡${count}"
behind  = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged  = "[+${count}](green)"
modified = "[~${count}](yellow)"
untracked = "[?${count}](red)"
deleted  = "[-${count}](red)"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[cmd_duration]
min_time = 2000
format   = "took [$duration]($style) "
style    = "bold yellow"

[python]
format = "[${symbol}${pyenv_prefix}(${version} )(\\($virtualenv\\))]($style) "
symbol = "py:"
style  = "bold yellow"

[terraform]
format   = "[tf:$workspace]($style) "
style    = "bold purple"
disabled = false

[kubernetes]
disabled = false
format   = "[k8s:$context\\($namespace\\)]($style) "
style    = "bold cyan"

[aws]
format   = "[aws:$profile(\\($region\\))]($style) "
style    = "bold yellow"
disabled = false

[battery]
disabled = true
