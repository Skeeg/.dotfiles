# Extended key sequences — allows applications to distinguish keys like
# Shift+Enter from Enter, Ctrl+Enter, Alt+arrows, etc.
set -g extended-keys always
set -as terminal-features "*:extkeys"

# Set terminal (iTerm2 tab) title to host: session.
# Locally: macpro: claude-scratch  |  Remote: bastion: claude-scratch
set -g set-titles on
set -g set-titles-string '#S: #{host_short}'
