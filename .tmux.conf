# Extended key sequences — allows applications to distinguish keys like
# Shift+Enter from Enter, Ctrl+Enter, Alt+arrows, etc.
set -g extended-keys always
set -as terminal-features "*:extkeys"

# Set terminal (iTerm2 tab) title to "session: host".
# Hostnames matching *-MAC (e.g. ABCDE12345-MAC) are normalized to just MAC.
set -g set-titles on
set -g set-titles-string '#S: #{s/.*-MAC/MAC/:host_short}'
